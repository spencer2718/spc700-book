name: Build textbook PDF

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book-pdf.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book-pdf.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preprocess Markdown
        run: python3 book/preprocess.py

      - name: Build PDF (pandoc + xelatex)
        uses: docker://pandoc/latex:3.1
        with:
          args: >-
            book/spc700_textbook_processed.md
            --metadata-file=book/metadata.yaml
            --include-in-header=book/preamble.tex
            --pdf-engine=xelatex
            --toc --toc-depth=2
            --top-level-division=part
            -o book/spc700_textbook.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: spc700-textbook-pdf
          path: book/spc700_textbook.pdf
          if-no-files-found: error
